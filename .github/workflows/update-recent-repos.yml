name: Update Recent Repos

on:
  schedule:
    - cron: '0 0 * * *'   # runs every day at midnight UTC
  workflow_dispatch:        # lets you trigger it manually from GitHub

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch recent repos and update README
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const { data: repos } = await github.rest.repos.listForUser({
              username: 'dineshkwadhwani',
              sort: 'pushed',
              direction: 'desc',
              per_page: 10,
              type: 'owner'
            });

            const filtered = repos
              .filter(r => !r.fork && r.name !== 'dineshkwadhwani')
              .slice(0, 6);

            // Build a card cell for one repo
            const cell = (repo) => {
              if (!repo) return `<td width="50%"></td>`;

              const desc = repo.description
                ? repo.description
                : '_No description — add one on GitHub for it to appear here._';

              const langBadge = repo.language
                ? `<img src="https://img.shields.io/github/languages/top/${repo.full_name}?style=flat-square&label=${encodeURIComponent(repo.language)}" alt="${repo.language}" />`
                : '';

              return `<td width="50%" valign="top">
              <h4><a href="${repo.html_url}">📁 ${repo.name}</a></h4>
              <p>${desc}</p>
              <p>
                ${langBadge}
                <img src="https://img.shields.io/github/stars/${repo.full_name}?style=flat-square" alt="stars" />
                <img src="https://img.shields.io/github/forks/${repo.full_name}?style=flat-square" alt="forks" />
                <img src="https://img.shields.io/github/last-commit/${repo.full_name}?style=flat-square" alt="last commit" />
              </p>
            </td>`;
            };

            // Layout: 2 cards per row
            const rows = [];
            for (let i = 0; i < filtered.length; i += 2) {
              rows.push(`<tr>\n${cell(filtered[i])}\n${cell(filtered[i + 1])}\n</tr>`);
            }

            const table = `<table>\n${rows.join('\n')}\n</table>`;
            const newSection = `<!-- RECENT-REPOS:START -->\n${table}\n<!-- RECENT-REPOS:END -->`;

            let readme = fs.readFileSync('README.md', 'utf8');
            readme = readme.replace(
              /<!-- RECENT-REPOS:START -->[\s\S]*?<!-- RECENT-REPOS:END -->/,
              newSection
            );
            fs.writeFileSync('README.md', readme);

      - name: Commit and push if README changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update recent repos"
          git push
